<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Portfolio</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <nav id="nav">
    <a href="projects.html" class="nav-item" id="projects">
      <span>Projects</span>
    </a>
    <a href="collaborations.html" class="nav-item" id="collaborations">
      <span>Collaborations</span>
    </a>
    <a href="contact.html" class="nav-item" id="contact">
      <span>Contact</span>
    </a>
  </nav>

  <script>
    const IMAGE_EXTS = ['jpg', 'jpeg', 'png', 'gif', 'webp', 'svg'];

    function loadThumbnail(section) {
      fetch('/' + section + '/thumbnail/')
        .then(function(r) { return r.text(); })
        .then(function(html) {
          var doc = new DOMParser().parseFromString(html, 'text/html');
          var first = Array.from(doc.querySelectorAll('a[href]'))
            .map(function(a) { return a.getAttribute('href'); })
            .find(function(href) {
              return IMAGE_EXTS.some(function(ext) {
                return href.toLowerCase().endsWith('.' + ext);
              });
            });
          if (first) {
            var url = '/' + section + '/thumbnail/' + first;
            document.getElementById(section).style.backgroundImage = 'url(' + url + ')';
          }
        });
    }

    ['projects', 'collaborations', 'contact'].forEach(loadThumbnail);
  </script>
</body>
</html>
