<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>Projects</title>
  <link rel="stylesheet" href="style.css"/>
</head>
<body>
  <a href="/home.html" class="back">←</a>
  <div class="page-list" id="list"></div>
  <p id="empty" hidden class="empty" style="position:fixed;top:50%;left:50%;transform:translate(-50%,-50%)">No pages yet.</p>

  <script>
    fetch('/api/pages?category=projects')
      .then(function(r) { return r.json(); })
      .then(function(pages) {
        if (!pages.length) { document.getElementById('empty').hidden = false; return; }
        var list = document.getElementById('list');
        pages.forEach(function(page) {
          var a = document.createElement('a');
          a.href = '/pages/' + page.slug;
          a.className = 'page-card';
          if (page.thumbnail) {
            var img = document.createElement('img');
            img.className = 'page-card-thumb';
            img.src = page.thumbnail;
            img.alt = page.title;
            a.appendChild(img);
          } else {
            var div = document.createElement('div');
            div.className = 'page-card-thumb-empty';
            a.appendChild(div);
          }
          var title = document.createElement('p');
          title.className = 'page-card-title';
          title.textContent = page.title;
          a.appendChild(title);
          list.appendChild(a);
        });
      });
  </script>
</body>
</html>
