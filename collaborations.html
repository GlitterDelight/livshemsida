<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>Collaborations</title>
  <link rel="stylesheet" href="style.css"/>
  <style>
    .nav-item { background: #111; }
    .nav-item img { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; }
    #empty { position: fixed; top: 50%; left: 50%; transform: translate(-50%,-50%);
      color: #555; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      font-size: 1rem; letter-spacing: .15em; text-transform: uppercase; }
  </style>
</head>
<body>
  <a href="/home.html" class="back">←</a>
  <nav id="nav"></nav>
  <p id="empty" hidden>No pages yet.</p>

  <script>
    fetch('/api/pages?category=collaborations')
      .then(function(r) { return r.json(); })
      .then(function(pages) {
        var nav = document.getElementById('nav');
        if (!pages.length) { document.getElementById('empty').hidden = false; return; }
        pages.forEach(function(page) {
          var a = document.createElement('a');
          a.href = '/pages/' + page.slug;
          a.className = 'nav-item';
          var img = document.createElement('img');
          if (page.thumbnail) img.src = page.thumbnail;
          var span = document.createElement('span');
          span.textContent = page.title;
          a.appendChild(img);
          a.appendChild(span);
          nav.appendChild(a);
        });
      });
  </script>
</body>
</html>
