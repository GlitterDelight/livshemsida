<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Portfolio</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <img id="slide" />
  <p class="empty" id="msg" hidden>No images yet.</p>

  <script>
    const IMAGE_EXTS = ['jpg', 'jpeg', 'png', 'gif', 'webp', 'svg'];
    const INTERVAL = 5000;

    fetch('/images/')
      .then(r => r.text())
      .then(html => {
        const doc = new DOMParser().parseFromString(html, 'text/html');
        const images = [...doc.querySelectorAll('a[href]')]
          .map(a => a.getAttribute('href'))
          .filter(href => IMAGE_EXTS.some(ext => href.toLowerCase().endsWith('.' + ext)))
          .map(href => '/images/' + href);

        if (images.length === 0) {
          document.getElementById('msg').hidden = false;
          document.getElementById('slide').hidden = true;
          return;
        }

        let current = 0;
        const slide = document.getElementById('slide');
        slide.src = images[0];

        setInterval(() => {
          current = (current + 1) % images.length;
          slide.src = images[current];
        }, INTERVAL);
      })
      .catch(() => {
        document.getElementById('msg').hidden = false;
        document.getElementById('slide').hidden = true;
      });
  </script>
</body>
</html>
