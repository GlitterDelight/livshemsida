<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Liv Meijer Nordgren</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #0f0f0f;
      height: 100vh;
      overflow: hidden;
    }

    #bg {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      z-index: 0;
      opacity: 0;
      transition: opacity 2s ease-in-out;
    }

    #overlay {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.35);
      z-index: 1;
    }

    #enter {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      z-index: 2;
      color: #fff;
      text-decoration: none;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      font-size: clamp(1.2rem, 3vw, 2rem);
      font-weight: 300;
      letter-spacing: 0.4em;
      text-transform: uppercase;
      opacity: 0.85;
      transition: opacity 0.3s, letter-spacing 0.3s;
    }

    #enter:hover {
      opacity: 1;
      letter-spacing: 0.55em;
    }
  </style>
</head>
<body>
  <video id="bg" autoplay muted loop playsinline>
    <source src="/videos/dyngbaggen.mp4" type="video/mp4" />
  </video>
  <div id="overlay"></div>
  <a id="enter" href="/home.html">Liv Meijer Nordgren</a>
  <script>
    const bg = document.getElementById('bg');
    bg.addEventListener('canplay', () => { bg.style.opacity = 1; });
  </script>
</body>
</html>
